<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตัวบทกฎหมายอาญา</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@300;400;500;600;700&family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf9f7;
  --surface: #ffffff;
  --surface2: #f5f3ef;
  --border: #e8e4dd;
  --border2: #d8d3ca;

  --ink: #1c1917;
  --ink2: #44403c;
  --ink3: #78716c;
  --ink4: #a8a29e;

  --gold: #92692a;
  --gold-light: #f7f0e4;
  --gold-mid: #d4a853;

  /* หมวดสี */
  --c-q2: #1d4ed8;
  --c-q3: #15803d;
  --c-q4: #7c2d12;

  /* Category colors */
  --col-help:   #64748b;
  --col-bribe:  #dc2626;
  --col-false:  #2563eb;
  --col-gang:   #be185d;
  --col-fire:   #ea580c;
  --col-note:   #9333ea;
  --col-coin:   #0d9488;
  --col-sex:    #9f1239;
  --col-doc:    #065f46;
  --col-def:    #78716c;
  --col-join:   #1e293b;

  --radius: 12px;
  --radius-sm: 8px;
  --shadow-card: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
  --shadow-hover: 0 4px 24px rgba(0,0,0,.10);
  --transition: all .2s cubic-bezier(.4,0,.2,1);
}

body {
  font-family: 'Sarabun', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ─────────────────────────── */
.page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

/* ── Header ─────────────────────────── */
.hero {
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}
.hero-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: .5rem;
}
.hero-title {
  font-family: 'Noto Serif Thai', serif;
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.02em;
  line-height: 1.2;
  margin-bottom: .4rem;
}
.hero-meta {
  font-size: 13px;
  color: var(--ink3);
  display: flex;
  gap: 1.2rem;
  flex-wrap: wrap;
}
.hero-meta span { display: flex; align-items: center; gap: 4px; }

/* ── Controls ─────────────────────────── */
.controls {
  display: flex;
  flex-direction: column;
  gap: .75rem;
  margin-bottom: 1.5rem;
}
.controls-row {
  display: flex;
  gap: .75rem;
  align-items: center;
  flex-wrap: wrap;
}

/* Search */
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink4);
  font-size: 16px;
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 9px 14px 9px 38px;
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-family: 'Sarabun', sans-serif;
  font-size: 13.5px;
  color: var(--ink);
  transition: var(--transition);
}
.search-input:focus {
  outline: none;
  border-color: var(--gold-mid);
  box-shadow: 0 0 0 3px rgba(212,168,83,.12);
}
.search-input::placeholder { color: var(--ink4); }

/* View toggle */
.view-toggle {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
  flex-shrink: 0;
}
.vbtn {
  padding: 5px 11px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--ink4);
  cursor: pointer;
  font-size: 14px;
  transition: var(--transition);
  display: flex;
  align-items: center;
}
.vbtn.active {
  background: var(--surface);
  color: var(--ink2);
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}

/* Top tabs */
.top-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.top-tab {
  padding: 7px 16px;
  border-radius: 50px;
  border: 1.5px solid var(--border2);
  background: transparent;
  color: var(--ink3);
  font-family: 'Sarabun', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: var(--transition);
  line-height: 1.3;
  font-weight: 400;
}
.top-tab:hover:not(.active) {
  background: var(--surface2);
  color: var(--ink2);
  border-color: var(--border2);
}
.top-tab.active {
  color: #fff;
  border-color: transparent;
  font-weight: 600;
}
.top-tab[data-id="all"].active  { background: var(--ink); }
.top-tab[data-id="q2"].active   { background: var(--c-q2); }
.top-tab[data-id="q3"].active   { background: var(--c-q3); }
.top-tab[data-id="q4"].active   { background: var(--c-q4); }

.tab-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 9px;
  font-size: 10.5px;
  font-weight: 600;
  margin-left: 4px;
  background: rgba(255,255,255,.22);
  color: inherit;
}
.top-tab:not(.active) .tab-count {
  background: var(--surface2);
  color: var(--ink4);
}

/* Sub tabs */
.sub-tabs {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.sub-tab {
  padding: 4px 12px;
  border-radius: 50px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--ink3);
  font-family: 'Sarabun', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
}
.sub-tab:hover:not(.active) { background: var(--surface2); color: var(--ink2); }
.sub-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }

/* Toolbar */
.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}
.stat-text { font-size: 12px; color: var(--ink4); }
.stat-text b { color: var(--ink3); font-weight: 600; }

/* ── CARD GRID ─────────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 12px;
}

.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: var(--shadow-card);
  position: relative;
}
.card:hover {
  border-color: var(--border2);
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}
.card.expanded {
  border-color: var(--gold-mid);
  box-shadow: 0 0 0 3px rgba(212,168,83,.12), var(--shadow-hover);
}

.card-top-bar { height: 4px; width: 100%; }
.card-body { padding: 14px 16px 12px; }

.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.matra {
  font-family: 'Noto Serif Thai', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  white-space: nowrap;
}
.cat-pill {
  font-size: 10.5px;
  font-weight: 600;
  padding: 2px 9px;
  border-radius: 50px;
  white-space: nowrap;
  letter-spacing: .01em;
}
.card-name {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.45;
  margin-bottom: 10px;
}
.sep { height: 1px; background: var(--border); margin-bottom: 10px; }
.short-lbl {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink4);
  margin-bottom: 5px;
}
.card-short { font-size: 12.5px; color: var(--ink3); line-height: 1.75; }
.card-full  { font-size: 12.5px; color: var(--ink2); line-height: 1.8; display: none; }
.card.expanded .card-short { display: none; }
.card.expanded .card-full  { display: block; }

.card-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 10px;
}
.expand-hint {
  font-size: 10.5px;
  color: var(--ink4);
  display: flex;
  align-items: center;
  gap: 3px;
  transition: color .15s;
}
.card:hover .expand-hint { color: var(--ink3); }
.expand-hint-close { display: none; }
.card.expanded .expand-hint-open  { display: none; }
.card.expanded .expand-hint-close { display: flex; }

/* ── LIST VIEW ─────────────────────────── */
.list-item {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: var(--shadow-card);
  margin-bottom: 8px;
}
.list-item:hover {
  border-color: var(--border2);
  box-shadow: var(--shadow-hover);
}
.list-item.expanded { border-color: var(--gold-mid); }

.list-inner { display: flex; }
.list-bar { width: 4px; flex-shrink: 0; }
.list-body { flex: 1; padding: 12px 16px; }
.list-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.list-matra {
  font-family: 'Noto Serif Thai', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
}
.list-name { font-size: 13.5px; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
.list-short { font-size: 12.5px; color: var(--ink3); line-height: 1.65; }
.list-full  {
  font-size: 12.5px;
  color: var(--ink2);
  line-height: 1.8;
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.list-item.expanded .list-short { display: none; }
.list-item.expanded .list-full  { display: block; }

/* ── Rich content inside full ─────────── */
.full-p { margin-bottom: 8px; }
.full-p b { font-weight: 600; color: var(--ink); }

.penalty-box {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  background: var(--gold-light);
  border: 1px solid #e8d5a8;
  border-left: 3px solid var(--gold-mid);
  padding: 8px 12px;
  border-radius: 0 8px 8px 0;
  margin: 8px 0;
  font-size: 12px;
  color: #5a3e0a;
  line-height: 1.7;
}
.penalty-box::before {
  content: '⚖️';
  flex-shrink: 0;
  margin-top: 1px;
}

.note-p {
  font-size: 11.5px;
  color: var(--ink3);
  font-style: italic;
  margin-bottom: 4px;
  padding-left: 2px;
  line-height: 1.65;
}

/* ── Category colors ─────────────────── */
/* Top bars & list bars */
.bar-ชวยเหลอผกระทาผด, .list-bar-ชวยเหลอผกระทาผด { background: var(--col-help); }
.bar-สนบน,           .list-bar-สนบน            { background: var(--col-bribe); }
.bar-แจงความเทจ,      .list-bar-แจงความเทจ       { background: var(--col-false); }
.bar-องยซองโจร,       .list-bar-องยซองโจร        { background: var(--col-gang); }
.bar-เพลงไหม,         .list-bar-เพลงไหม          { background: var(--col-fire); }
.bar-ปลอมเงนตราธนบตร, .list-bar-ปลอมเงนตราธนบตร  { background: var(--col-note); }
.bar-บตรอเลกทรอนกส,   .list-bar-บตรอเลกทรอนกส    { background: var(--col-coin); }
.bar-ปลอมเงนตราเหรยญ, .list-bar-ปลอมเงนตราเหรยญ  { background: var(--col-coin); }
.bar-ความผดเกยวกบเพศ,  .list-bar-ความผดเกยวกบเพศ   { background: var(--col-sex); }
.bar-เอกสาร,          .list-bar-เอกสาร           { background: var(--col-doc); }
.bar-นยาม,            .list-bar-นยาม             { background: var(--col-def); }
.bar-ตวการรวม,         .list-bar-ตวการรวม          { background: var(--col-join); }

/* Pills */
.pill-ชวยเหลอผกระทาผด { background: #f1f5f9; color: var(--col-help); }
.pill-สนบน            { background: #fef2f2; color: var(--col-bribe); }
.pill-แจงความเทจ       { background: #eff6ff; color: var(--col-false); }
.pill-องยซองโจร        { background: #fdf2f8; color: var(--col-gang); }
.pill-เพลงไหม          { background: #fff7ed; color: var(--col-fire); }
.pill-ปลอมเงนตราธนบตร  { background: #faf5ff; color: var(--col-note); }
.pill-บตรอเลกทรอนกส    { background: #f0fdfa; color: var(--col-coin); }
.pill-ปลอมเงนตราเหรยญ  { background: #f0fdfa; color: var(--col-coin); }
.pill-ความผดเกยวกบเพศ   { background: #fff1f2; color: var(--col-sex); }
.pill-เอกสาร           { background: #f0fdf4; color: var(--col-doc); }
.pill-นยาม             { background: #f5f5f4; color: var(--col-def); }
.pill-ตวการรวม          { background: #f1f5f9; color: var(--col-join); }

/* ── Empty state ─────────────────────── */
.empty {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--ink4);
}
.empty i { font-size: 36px; display: block; margin-bottom: 12px; color: var(--border2); }
.empty p { font-size: 14px; }

/* ── Responsive ─────────────────────── */
@media (max-width: 600px) {
  .page { padding: 1.25rem 1rem 3rem; }
  .hero-title { font-size: 22px; }
  .top-tab { font-size: 12px; padding: 6px 12px; }
  .cards-grid { grid-template-columns: 1fr; }
}

/* ── Highlight system ─────────────────── */
mark.hl {
  border-radius: 3px;
  padding: 1px 0;
  cursor: pointer;
  transition: filter .15s;
  position: relative;
}
mark.hl:hover { filter: brightness(.88); }
mark.hl[data-color="yellow"]  { background: #fef08a; color: inherit; }
mark.hl[data-color="green"]   { background: #bbf7d0; color: inherit; }
mark.hl[data-color="blue"]    { background: #bae6fd; color: inherit; }
mark.hl[data-color="pink"]    { background: #fbcfe8; color: inherit; }
mark.hl[data-color="orange"]  { background: #fed7aa; color: inherit; }

/* Floating toolbar */
#hl-toolbar {
  position: fixed;
  z-index: 9999;
  display: none;
  align-items: center;
  gap: 4px;
  background: #1c1917;
  border-radius: 10px;
  padding: 6px 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,.28), 0 2px 8px rgba(0,0,0,.18);
  transform: translateX(-50%);
  pointer-events: auto;
}
#hl-toolbar::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-bottom: none;
  border-top-color: #1c1917;
}
.hl-swatch {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.25);
  cursor: pointer;
  transition: transform .15s, border-color .15s;
  flex-shrink: 0;
}
.hl-swatch:hover { transform: scale(1.25); border-color: #fff; }
.hl-swatch[data-color="yellow"] { background: #fef08a; }
.hl-swatch[data-color="green"]  { background: #bbf7d0; }
.hl-swatch[data-color="blue"]   { background: #bae6fd; }
.hl-swatch[data-color="pink"]   { background: #fbcfe8; }
.hl-swatch[data-color="orange"] { background: #fed7aa; }
.hl-divider { width: 1px; height: 16px; background: rgba(255,255,255,.2); margin: 0 2px; }
.hl-erase {
  background: none; border: none;
  color: rgba(255,255,255,.6);
  cursor: pointer; font-size: 13px;
  padding: 2px 4px; border-radius: 5px;
  transition: color .15s, background .15s;
  display: flex; align-items: center;
}
.hl-erase:hover { color: #fff; background: rgba(255,255,255,.12); }

/* Clear-all badge */
#hl-clear-all {
  display: none;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--ink4);
  cursor: pointer;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: var(--transition);
}
#hl-clear-all:hover { color: #dc2626; border-color: #fca5a5; }
#hl-clear-all i { font-size: 12px; }
</style>

</head>
<body>
<div class="page">

  <!-- Hero -->
  <header class="hero">
    <div class="hero-eyebrow">ประมวลกฎหมายอาญา</div>
    <h1 class="hero-title">ตัวบทกฎหมายอาญา</h1>
    <div class="hero-meta">
      <span><i class="ti ti-files"></i> 29 มาตรา</span>
      <span><i class="ti ti-category"></i> จัดตามข้อสอบ</span>
      <span><i class="ti ti-hand-click"></i> แตะบัตรเพื่อดูตัวบทเต็ม</span>
    </div>
  </header>

  <!-- Controls -->
  <div class="controls">
    <div class="controls-row">
      <div class="search-wrap">
        <i class="ti ti-search search-icon"></i>
        <input class="search-input" type="search" placeholder="ค้นหา มาตรา ชื่อความผิด หรือหมวดหมู่..." oninput="onSearch(this.value)">
      </div>
      <div class="view-toggle">
        <button class="vbtn active" id="btn-card" onclick="setView('card')" title="มุมมองบัตร"><i class="ti ti-layout-grid"></i></button>
        <button class="vbtn" id="btn-list" onclick="setView('list')" title="มุมมองรายการ"><i class="ti ti-list"></i></button>
      </div>
    </div>
    <div class="top-tabs" id="top-tabs"></div>
    <div class="sub-tabs" id="sub-tabs"></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="stat-text" id="stat-text"></div>
    <button id="hl-clear-all" onclick="clearAllHighlights()">
      <i class="ti ti-eraser"></i> ลบไฮไลต์ทั้งหมด
    </button>
  </div>

  <!-- Floating highlight toolbar -->
  <div id="hl-toolbar">
    <button class="hl-swatch" data-color="yellow" title="เหลือง" onclick="applyHighlight('yellow')"></button>
    <button class="hl-swatch" data-color="green"  title="เขียว"  onclick="applyHighlight('green')"></button>
    <button class="hl-swatch" data-color="blue"   title="ฟ้า"    onclick="applyHighlight('blue')"></button>
    <button class="hl-swatch" data-color="pink"   title="ชมพู"   onclick="applyHighlight('pink')"></button>
    <button class="hl-swatch" data-color="orange" title="ส้ม"    onclick="applyHighlight('orange')"></button>
    <div class="hl-divider"></div>
    <button class="hl-erase" title="ลบไฮไลต์" onclick="eraseHighlight()"><i class="ti ti-eraser"></i></button>
  </div>

  <!-- Content -->
  <div id="cards-area"></div>

</div>

<script>
const GROUPS = [
  { id: "all", label: "ทั้งหมด" },
  { id: "q2",  label: "ข้อ 2 · เจ้าพนักงาน & ยุติธรรม" },
  { id: "q3",  label: "ข้อ 3 · ความสงบสุข & เพลิงไหม้" },
  { id: "q4",  label: "ข้อ 4 · บัตร / เงินตรา / เพศ / เอกสาร" },
];

const CATS = {
  "ช่วยเหลือผู้กระทำผิด": { g: "q2" },
  "สินบน":                 { g: "q2" },
  "แจ้งความเท็จ":          { g: "q2" },
  "อั้งยี่/ซ่องโจร":        { g: "q3" },
  "ปลอมเงินตรา (ธนบัตร)":   { g: "q3" },
  "เพลิงไหม้":              { g: "q3" },
  "บัตรอิเล็กทรอนิกส์":     { g: "q4" },
  "ปลอมเงินตรา (เหรียญ)":   { g: "q4" },
  "ความผิดเกี่ยวกับเพศ":    { g: "q4" },
  "เอกสาร":                { g: "q4" },
  "นิยาม":                 { g: "q4" },
  "ตัวการร่วม":             { g: "q4" },
};

const DATA = [

// ── Helpers
function slug(s){ return s.replace(/[^ก-๙a-zA-Z0-9]/g,""); }
function barCls(c){ return "bar-" + slug(c); }
function listBarCls(c){ return "list-bar-" + slug(c); }
function pillCls(c){ return "pill-" + slug(c); }

let topCat = "all", subCat = "all_sub", view = "card", q = "";

function matchGroup(d){
  if(topCat === "all") return true;
  return CATS[d.cat] && CATS[d.cat].g === topCat;
}
function getSubCats(){
  const src = topCat === "all" ? DATA : DATA.filter(d => matchGroup(d));
  return [...new Set(src.map(d => d.cat))];
}
function getFiltered(){
  return DATA.filter(d => {
    if(!matchGroup(d)) return false;
    if(subCat !== "all_sub" && d.cat !== subCat) return false;
    const lq = q.toLowerCase();
    if(lq && !d.m.toLowerCase().includes(lq) && !d.name.toLowerCase().includes(lq)
         && !d.short.toLowerCase().includes(lq) && !d.cat.toLowerCase().includes(lq)) return false;
    return true;
  });
}
function toggle(prefix, i){
  const el = document.getElementById(prefix + i);
  if(el) el.classList.toggle("expanded");
}

function renderTopTabs(){
  document.getElementById("top-tabs").innerHTML = GROUPS.map(g => {
    const cnt = g.id === "all" ? DATA.length : DATA.filter(d => CATS[d.cat] && CATS[d.cat].g === g.id).length;
    return `<button class="top-tab${topCat===g.id?" active":""}" data-id="${g.id}" onclick="setTop('${g.id}')">${g.label}<span class="tab-count">${cnt}</span></button>`;
  }).join("");
}
function renderSubTabs(){
  const subs = getSubCats();
  if(subs.length <= 1){ document.getElementById("sub-tabs").innerHTML = ""; return; }
  const cnt = c => DATA.filter(d => d.cat === c && matchGroup(d)).length;
  document.getElementById("sub-tabs").innerHTML =
    `<button class="sub-tab${subCat==="all_sub"?" active":""}" onclick="setSub('all_sub')">ทั้งหมด</button>` +
    subs.map(c => `<button class="sub-tab${subCat===c?" active":""}" onclick="setSub('${c}')">${c} <span style="opacity:.55;font-size:10.5px">${cnt(c)}</span></button>`).join("");
}
function renderContent(){
  const f = getFiltered();
  document.getElementById("stat-text").innerHTML = `แสดง <b>${f.length}</b> มาตรา`;
  const area = document.getElementById("cards-area");
  if(!f.length){
    area.className = "";
    area.innerHTML = `<div class="empty"><i class="ti ti-mood-empty"></i><p>ไม่พบมาตราที่ค้นหา</p></div>`;
    return;
  }
  if(view === "card"){
    area.className = "cards-grid";
    area.innerHTML = f.map((d,i) => `
      <div class="card" id="c${i}" onclick="toggle('c',${i})">
        <div class="card-top-bar ${barCls(d.cat)}"></div>
        <div class="card-body">
          <div class="card-header">
            <span class="matra">${d.m}</span>
            <span class="cat-pill ${pillCls(d.cat)}">${d.cat}</span>
          </div>
          <div class="card-name">${d.name}</div>
          <div class="sep"></div>
          <div class="short-lbl">สรุปย่อ</div>
          <div class="card-short">${d.short}</div>
          <div class="card-full">${d.full}</div>
          <div class="card-footer">
            <span class="expand-hint expand-hint-open"><i class="ti ti-chevron-down" style="font-size:11px"></i>&nbsp;ดูตัวบทเต็ม</span>
            <span class="expand-hint expand-hint-close"><i class="ti ti-chevron-up" style="font-size:11px"></i>&nbsp;ย่อกลับ</span>
          </div>
        </div>
      </div>`).join("");
  } else {
    area.className = "";
    area.innerHTML = f.map((d,i) => `
      <div class="list-item" id="l${i}" onclick="toggle('l',${i})">
        <div class="list-inner">
          <div class="list-bar ${listBarCls(d.cat)}"></div>
          <div class="list-body">
            <div class="list-top">
              <span class="list-matra">${d.m}</span>
              <span class="cat-pill ${pillCls(d.cat)}">${d.cat}</span>
            </div>
            <div class="list-name">${d.name}</div>
            <div class="list-short">${d.short}</div>
            <div class="list-full">${d.full}</div>
          </div>
        </div>
      </div>`).join("");
  }
}
function render(){ renderTopTabs(); renderSubTabs(); renderContent(); if(typeof restoreAllHighlights==="function") restoreAllHighlights(); }
function setTop(id){ topCat = id; subCat = "all_sub"; render(); }
function setSub(c){ subCat = c; render(); }
function setView(v){
  view = v;
  document.getElementById("btn-card").className = "vbtn" + (v==="card" ? " active" : "");
  document.getElementById("btn-list").className = "vbtn" + (v==="list" ? " active" : "");
  renderContent();
  if(typeof restoreAllHighlights==="function") restoreAllHighlights();
}
function onSearch(val){ q = val; renderContent(); if(typeof restoreAllHighlights==="function") restoreAllHighlights(); }
// ── Highlight system (persistent via window.storage) ──────────

const HL_STORAGE_KEY = "hl-data";

// In-memory store: { id → { id, matra, field, charStart, charEnd, color, text } }
// field: "short" | "full"
let hlMap = {};     // loaded from storage
let pendingSel = null;
let activeMarkEl = null;
const toolbar = document.getElementById("hl-toolbar");

// ── Storage helpers ──────────────────────────────────────────

async function persistHL() {
  try {
    await window.storage.set(HL_STORAGE_KEY, JSON.stringify(hlMap));
  } catch(e) { console.warn("storage.set failed", e); }
}

async function loadHLFromStorage() {
  try {
    const res = await window.storage.get(HL_STORAGE_KEY);
    hlMap = res ? JSON.parse(res.value) : {};
  } catch { hlMap = {}; }
}

// ── Character-offset helpers (text-only, ignores mark tags) ───

function getTextContent(el) {
  // Plain text ignoring <mark> boundaries (so offsets survive re-render)
  return el ? el.textContent : "";
}

function getCharOffset(container, targetNode, offsetInNode) {
  // Walk text nodes inside container, sum lengths until we reach targetNode
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
  let total = 0, node;
  while ((node = walker.nextNode())) {
    if (node === targetNode) return total + offsetInNode;
    total += node.length;
  }
  return total;
}

function applyMarkAtCharRange(container, charStart, charEnd, hlid, color) {
  // Walk text nodes and wrap the exact character range
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
  let pos = 0, node;
  const segments = []; // { node, from, to } to wrap

  while ((node = walker.nextNode())) {
    const len = node.length;
    const nodeEnd = pos + len;
    if (nodeEnd <= charStart) { pos = nodeEnd; continue; }
    if (pos >= charEnd) break;
    segments.push({ node, from: Math.max(0, charStart - pos), to: Math.min(len, charEnd - pos) });
    pos = nodeEnd;
  }

  segments.reverse().forEach(({ node, from, to }) => {
    try {
      const range = document.createRange();
      range.setStart(node, from);
      range.setEnd(node, to);
      const mark = document.createElement("mark");
      mark.className = "hl";
      mark.dataset.color = color;
      mark.dataset.hlid = hlid;
      range.surroundContents(mark);
      mark.addEventListener("click", e => { e.stopPropagation(); showEraseForMark(mark, e); });
    } catch {}
  });
}

// ── Find which card element & field a node belongs to ────────

function findContext(node) {
  let el = node.nodeType === 3 ? node.parentElement : node;
  while (el && el !== document.body) {
    const cls = el.classList;
    if (cls && (cls.contains("card-full") || cls.contains("list-full")
             || cls.contains("card-short") || cls.contains("list-short"))) {
      const field = (cls.contains("card-full") || cls.contains("list-full")) ? "full" : "short";
      // Find card id
      let p = el.parentElement;
      while (p && p !== document.body) {
        if (p.id && (p.id.startsWith("c") || p.id.startsWith("l"))) {
          // Get matra from DATA by index
          const idx = parseInt(p.id.slice(1));
          const matra = DATA[idx] ? DATA[idx].m : p.id;
          return { container: el, field, cardId: p.id, matra, dataIdx: idx };
        }
        p = p.parentElement;
      }
    }
    el = el.parentElement;
  }
  return null;
}

// ── Restore highlights on a specific card element ────────────

function restoreHighlightsForCard(cardEl, prefix) {
  const idx = parseInt(cardEl.id.slice(prefix.length));
  const matra = DATA[idx] ? DATA[idx].m : "";
  Object.values(hlMap).forEach(h => {
    if (h.matra !== matra) return;
    const cls = h.field === "full"
      ? (prefix === "c" ? ".card-full" : ".list-full")
      : (prefix === "c" ? ".card-short" : ".list-short");
    const container = cardEl.querySelector(cls);
    if (!container) return;
    applyMarkAtCharRange(container, h.charStart, h.charEnd, h.id, h.color);
  });
}

// Called after render() to restore all visible highlights
function restoreAllHighlights() {
  document.querySelectorAll("[id^='c']").forEach(el => {
    if (/^c\d+$/.test(el.id)) restoreHighlightsForCard(el, "c");
  });
  document.querySelectorAll("[id^='l']").forEach(el => {
    if (/^l\d+$/.test(el.id)) restoreHighlightsForCard(el, "l");
  });
  updateClearBtn();
}

// ── Toolbar position ─────────────────────────────────────────

function positionToolbarAtRect(rect) {
  const scrollY = window.scrollY || document.documentElement.scrollTop;
  toolbar.style.display = "flex";
  // Force reflow to get real height
  const th = toolbar.getBoundingClientRect().height || 44;
  toolbar.style.left = (rect.left + rect.width / 2) + "px";
  toolbar.style.top  = (rect.top + scrollY - th - 12) + "px";
}

function hideToolbar() {
  toolbar.style.display = "none";
  pendingSel = null;
  activeMarkEl = null;
}

// ── Selection events ─────────────────────────────────────────

document.addEventListener("mouseup",  onSelectionEnd);
document.addEventListener("touchend", e => setTimeout(() => onSelectionEnd(e), 80));
document.addEventListener("mousedown", e => {
  if (!toolbar.contains(e.target) && !e.target.closest("mark.hl")) hideToolbar();
});

function onSelectionEnd(e) {
  if (toolbar.contains(e.target)) return;
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) return;

  const ctx = findContext(sel.anchorNode);
  if (!ctx) { hideToolbar(); return; }

  pendingSel = { range: sel.getRangeAt(0).cloneRange(), ctx };
  activeMarkEl = null;
  const rect = sel.getRangeAt(0).getBoundingClientRect();
  positionToolbarAtRect(rect);
}

// ── Apply highlight ───────────────────────────────────────────

function applyHighlight(color) {
  if (!pendingSel) {
    // Clicked swatch while a mark is active → change color
    if (activeMarkEl) changeMarkColor(color);
    return;
  }
  const { range, ctx } = pendingSel;
  if (range.collapsed) return;

  const charStart = getCharOffset(ctx.container, range.startContainer, range.startOffset);
  const charEnd   = getCharOffset(ctx.container, range.endContainer,   range.endOffset);
  if (charStart >= charEnd) return;

  const hlid = Date.now() + "_" + Math.random().toString(36).slice(2,7);
  const hlEntry = {
    id: hlid, matra: ctx.matra, field: ctx.field,
    charStart, charEnd, color,
    text: range.toString().slice(0, 120),
  };

  applyMarkAtCharRange(ctx.container, charStart, charEnd, hlid, color);

  hlMap[hlid] = hlEntry;
  persistHL();
  updateClearBtn();
  window.getSelection().removeAllRanges();
  hideToolbar();
}

// ── Click on existing mark ────────────────────────────────────

function showEraseForMark(mark, e) {
  pendingSel = null;
  activeMarkEl = mark;
  const rect = mark.getBoundingClientRect();
  positionToolbarAtRect(rect);
}

function eraseHighlight() {
  if (!activeMarkEl) return;
  const id = activeMarkEl.dataset.hlid;
  removeMarkById(id);
  delete hlMap[id];
  persistHL();
  updateClearBtn();
  hideToolbar();
}

function changeMarkColor(color) {
  if (!activeMarkEl) return;
  const id = activeMarkEl.dataset.hlid;
  document.querySelectorAll(`mark.hl[data-hlid="${id}"]`).forEach(m => m.dataset.color = color);
  if (hlMap[id]) hlMap[id].color = color;
  persistHL();
  hideToolbar();
}

function removeMarkById(id) {
  document.querySelectorAll(`mark.hl[data-hlid="${id}"]`).forEach(m => {
    const p = m.parentNode;
    while (m.firstChild) p.insertBefore(m.firstChild, m);
    p.removeChild(m);
    p.normalize();
  });
}

// ── Swatch clicks (dual purpose: apply or change color) ───────

document.querySelectorAll(".hl-swatch").forEach(btn => {
  btn.addEventListener("click", () => applyHighlight(btn.dataset.color));
});

// ── Clear all ────────────────────────────────────────────────

function clearAllHighlights() {
  if (!confirm("ลบไฮไลต์ทั้งหมด?")) return;
  document.querySelectorAll("mark.hl").forEach(m => {
    const p = m.parentNode;
    while (m.firstChild) p.insertBefore(m.firstChild, m);
    p.removeChild(m);
    p.normalize();
  });
  hlMap = {};
  persistHL();
  updateClearBtn();
  hideToolbar();
}

function updateClearBtn() {
  const btn = document.getElementById("hl-clear-all");
  const count = Object.keys(hlMap).length;
  btn.style.display = count ? "flex" : "none";
  if (count) btn.innerHTML = `<i class="ti ti-eraser"></i> ลบไฮไลต์ทั้งหมด (${count})`;
}

// ── Boot: load from storage, then render ─────────────────────

loadHLFromStorage().then(() => {
  render();
  restoreAllHighlights();
});
</script>
